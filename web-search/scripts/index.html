<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web Search</title>
</head>
<body>
<script>
  /**
   * Web Search skill for AI Edge Gallery.
   *
   * Strategy (all CORS-safe, no API key required):
   *   1. Jina AI Search API  (s.jina.ai) — returns structured Markdown
   *      with titles, URLs and summaries for the top results.
   *   2. DuckDuckGo Instant Answer API — JSONP-style, works from browser
   *      when the &callback= param is omitted and origin is trusted.
   *      Used as a lightweight fallback for factual/entity queries.
   *
   * Both endpoints respond with Access-Control-Allow-Origin: *
   */

  /* ── 1. Jina Search (primary) ─────────────────────────────────────── */
  async function searchJina(query, topK) {
    // s.jina.ai wraps a Google search and returns clean Markdown.
    // Accept: application/json returns structured JSON instead of Markdown.
    const url = `https://s.jina.ai/${encodeURIComponent(query)}`;
    const res = await fetch(url, {
      headers: {
        'Accept': 'application/json',
        'X-Retain-Images': 'none',
        'X-No-Cache': 'true'
      }
    });
    if (!res.ok) throw new Error(`Jina Search error: ${res.status}`);
    const data = await res.json();

    // Jina returns { data: [ { title, url, description, content }, ... ] }
    const items = (data.data || []).slice(0, topK);
    return items.map(item => ({
      title:   item.title   || '(no title)',
      url:     item.url     || '',
      snippet: item.description || (item.content || '').substring(0, 300)
    }));
  }

  /* ── 2. DuckDuckGo Instant Answer (fallback) ──────────────────────── */
  async function searchDDGInstant(query, topK) {
    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`DDG API error: ${res.status}`);
    const data = await res.json();

    const results = [];
    if (data.AbstractText) {
      results.push({
        title:   data.Heading || query,
        url:     data.AbstractURL || '',
        snippet: data.AbstractText
      });
    }
    for (const topic of (data.RelatedTopics || [])) {
      if (!topic.Text || !topic.FirstURL) continue;
      results.push({
        title:   topic.Text.split(' - ')[0].substring(0, 80),
        url:     topic.FirstURL,
        snippet: topic.Text
      });
      if (results.length >= topK) break;
    }
    return results;
  }

  /* ── Entry point ─────────────────────────────────────────────────── */
  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      if (!jsonData.query) {
        return JSON.stringify({ error: 'No search query provided.' });
      }

      const query = jsonData.query;
      const topK  = Math.min(jsonData.top_k || 5, 10);

      /* Try Jina first — rich results with real URLs */
      let results = [];
      try {
        results = await searchJina(query, topK);
      } catch (jinaErr) {
        console.warn('Jina search failed, trying DDG:', jinaErr.message);
      }

      /* Fall back to DDG Instant Answer if Jina returned nothing */
      if (results.length === 0) {
        try {
          results = await searchDDGInstant(query, topK);
        } catch (ddgErr) {
          console.warn('DDG fallback failed:', ddgErr.message);
        }
      }

      if (results.length === 0) {
        return JSON.stringify({
          error: `No results found for: "${query}". The search APIs may be temporarily unavailable, or try a more specific query.`
        });
      }

      const formatted = results
        .map((r, i) => `[${i + 1}] ${r.title}\nURL: ${r.url}\nSnippet: ${r.snippet}`)
        .join('\n\n');

      return JSON.stringify({
        result: `Search results for: "${query}"\n\n${formatted}`
      });

    } catch (e) {
      console.error(e);
      return JSON.stringify({ error: `Search failed: ${e.message}` });
    }
  };
</script>
</body>
</html>
