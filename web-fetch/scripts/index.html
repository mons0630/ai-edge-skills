<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web Fetch</title>
</head>
<body>
<script>
  /**
   * Web Fetch skill for AI Edge Gallery.
   *
   * Uses Jina AI Reader API (r.jina.ai) — CORS-safe, no API key required.
   * Converts any public URL into clean Markdown text, perfect for LLM context.
   *
   * Accept: application/json returns structured { data: { title, url, content } }.
   * Fallback: plain text mode if JSON mode fails.
   */

  async function fetchWithJina(url, maxChars) {
    const jinaUrl = `https://r.jina.ai/${url}`;

    /* Try JSON mode first for structured output */
    let res = await fetch(jinaUrl, {
      headers: {
        'Accept': 'application/json',
        'X-Retain-Images': 'none',
        'X-Remove-Selector': 'header,footer,nav,aside'
      }
    });

    if (res.ok) {
      const json = await res.json();
      const item = json.data || json;
      let text = item.content || item.text || '';
      const title = item.title || '';
      if (!text) throw new Error('Jina returned empty content.');

      // Prepend title for context
      if (title) text = `# ${title}\n\n${text}`;

      if (text.length > maxChars) {
        text = text.substring(0, maxChars) + '\n\n... [TRUNCATED TO SAVE CONTEXT]';
      }
      return text;
    }

    /* Fallback: plain text mode */
    res = await fetch(jinaUrl, {
      headers: {
        'Accept': 'text/plain',
        'X-Retain-Images': 'none'
      }
    });
    if (!res.ok) throw new Error(`Jina Reader error: ${res.status} ${res.statusText}`);
    let text = await res.text();
    if (!text.trim()) throw new Error('Page returned empty content.');

    if (text.length > maxChars) {
      text = text.substring(0, maxChars) + '\n\n... [TRUNCATED TO SAVE CONTEXT]';
    }
    return text;
  }

  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      if (!jsonData.url) {
        return JSON.stringify({ error: 'No URL provided. Please supply a full URL starting with https://' });
      }

      const targetUrl = jsonData.url.trim();
      if (!/^https?:\/\//i.test(targetUrl)) {
        return JSON.stringify({ error: `Invalid URL: "${targetUrl}". URL must start with http:// or https://` });
      }

      const maxChars = Math.min(jsonData.max_chars || 4000, 8000);
      const text = await fetchWithJina(targetUrl, maxChars);

      return JSON.stringify({ result: text });
    } catch (e) {
      console.error(e);
      return JSON.stringify({ error: `Failed to fetch URL: ${e.message}` });
    }
  };
</script>
</body>
</html>
